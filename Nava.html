<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوا | Nava</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --panel-bg: #111827;
            --border-color: #334155;
            --warning-color: #f59e0b;
            --slider-empty: #334155;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-color: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --panel-bg: #f8fafc;
            --border-color: #cbd5e1;
            --slider-empty: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Vazirmatn, system-ui, sans-serif;
            transition: background-color 0.2s, border-color 0.2s, color 0.1s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            background-color: var(--card-color);
            width: 100%;
            max-width: 560px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: min(750px, 92vh); /* ساختار ریسپانسیو پویا برای ارتفاع */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        header h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background-color: var(--panel-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .icon-btn:hover { 
            background-color: var(--border-color); 
            color: var(--text-color);
            transform: translateY(-1px) scale(1.05);
            border-color: var(--text-muted);
        }

        .icon-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .manage-panel {
            background: var(--panel-bg);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--border-color);
            overflow-y: auto; /* اسکرول برای مواقعی که فرم در مانیتورهای کوچک جا نمیشود */
            flex-shrink: 0;
        }

        .manage-panel h3 { font-size: 13px; color: var(--accent-color); display: flex; align-items: center; gap: 6px; }

        .form-row { display: flex; gap: 6px; }

        input[type="text"], select {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            border-radius: 6px;
            color: var(--text-color);
            font-size: 12px;
            outline: none;
            flex-grow: 1;
            width: 100%;
        }
        input[type="text"]:focus, select:focus { border-color: var(--accent-color); }

        .action-mini-btn {
            background: var(--success-color);
            border: none; color: white; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 12px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .backup-zone {
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }
        .backup-btn {
            background: var(--border-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
            transition: all 0.2s;
        }
        .backup-btn:hover {
            background: var(--card-color);
            border-color: var(--accent-color);
        }

        .tabs-container {
            display: flex;
            gap: 6px;
            padding-bottom: 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .tabs-container::-webkit-scrollbar { height: 4px; }
        .tabs-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .tab-btn {
            background: var(--panel-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .tab-btn .delete-cat-icon { color: inherit; opacity: 0.6; font-size: 13px; }
        .tab-btn .delete-cat-icon:hover { color: var(--danger-color); opacity: 1; }

        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 4px;
        }
        .main-content::-webkit-scrollbar { width: 5px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .main-content::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .station-list { list-style: none; }

        .station-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background-color: var(--panel-bg);
            margin-bottom: 6px;
            border-radius: 8px;
            border: 1px solid transparent;
        }
        .station-item.active-playing {
            border-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.1);
        }

        .station-info {
            cursor: pointer;
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }
        .station-info span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-star { color: var(--text-muted); cursor: pointer; font-size: 14px; transition: color 0.2s; flex-shrink: 0; }
        .fav-star.active { color: #eab308; }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        /* در حالت موبایل دکمه‌ها همیشه نمایش داده شوند تا تجربه لمسی خراب نشود */
        @media (max-width: 768px) {
            .item-actions { opacity: 1; }
        }
        .station-item:hover .item-actions {
            opacity: 1;
        }

        .item-actions button, .drag-handle {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; font-size: 13px;
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; border-radius: 4px;
            transition: all 0.15s;
        }
        .drag-handle {
            cursor: grab;
            color: var(--text-muted);
        }
        .drag-handle:active { cursor: grabbing; }
        
        .item-actions button.edit:hover { background: rgba(59, 130, 246, 0.15); color: var(--accent-color); }
        .item-actions button.delete:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger-color); }
        .drag-handle:hover { background: rgba(248, 250, 252, 0.1); color: var(--text-color); }

        /* استایل اسلایدرها */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: var(--border-color);
            height: 6px;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.15s;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            background: var(--accent-hover);
        }

        .bottom-player {
            background: var(--panel-bg);
            padding: 14px 12px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .playing-name { font-weight: bold; font-size: 14px; color: var(--accent-color); display: flex; align-items: center; gap: 6px;     overflow: hidden;}
        .playing-name span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-shrink: 0;}
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
        .status-dot.playing { background: var(--success-color); box-shadow: 0 0 8px var(--success-color); }
        .status-dot.loading { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .status-dot.error { background: var(--danger-color); box-shadow: 0 0 8px var(--danger-color); }

        .meta-info {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            min-height: 18px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .controls-inline-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            direction: ltr !important; 
        }

        .control-sub-group {
            display: flex;
            align-items: center;
            gap: 8px;
            direction: ltr !important;
        }

        .timeline-container {
            flex-grow: 2;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timeline-container input { width: 100%; min-width: 60px; }
        .time-text { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

        .volume-container {
            flex-grow: 1;
            max-width: 120px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .volume-container input { width: 100%; }

        .player-action-btn {
            background-color: var(--card-color);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .player-action-btn:hover { 
            background-color: var(--border-color); 
            color: var(--text-color);
            transform: scale(1.05);
        }

        #master-play-btn { 
            background: var(--accent-color); 
            color: white; 
            border-color: var(--accent-color);
            width: 38px; 
            height: 38px; 
            font-size: 13px;
        }
        #master-play-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover);}
        #master-stop-btn:hover { color: var(--danger-color); border-color: rgba(239, 68, 68, 0.3); }

        html[dir="ltr"] .main-content { padding-right: 0; padding-left: 4px; }

        /* میدیا کوئری‌های ریسپانسیو اختصاصی صفحات کوچک و موبایل */
        @media (max-width: 480px) {
            body { padding: 6px; }
            .container { padding: 14px; height: 96vh; }
            header h1 { font-size: 16px; }
            .form-row { flex-direction: column; gap: 8px; }
            .backup-zone { flex-direction: column; }
            
            /* بازسازی ساختار ردیف کنترل پلیر به حالت دو ردیفه در موبایل جهت جلوگیری از مچاله شدن */
            .controls-inline-row {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
            .timeline-container {
                width: 100%;
                justify-content: space-between;
            }
            .volume-container {
                max-width: none;
                width: 100%;
                justify-content: flex-end;
                border-top: 1px solid var(--border-color);
                padding-top: 8px;
            }
            .volume-container input { max-width: 150px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="app-title"><i class="fa-solid fa-radio"></i> نوا</h1>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleLang()" id="lang-toggle-btn" title="Change Language">EN</button>
            <a class="icon-btn" href="https://github.com/Arvanta/Nava" target="_blank" id="github-link" title="GitHub Repository"><i class="fa-brands fa-github"></i></a>
            <button class="icon-btn" onclick="toggleTheme()" id="theme-toggle-btn" title="تغییر پوسته"><i class="fa-solid fa-moon"></i></button>
            <button class="icon-btn" onclick="toggleManagePanel()" id="manage-toggle-btn" title="مدیریت رادیو"><i class="fa-solid fa-plus"></i></button>
        </div>
    </header>

    <div class="manage-panel" id="manage-panel">
        <div>
            <h3 id="chan-form-title"><i class="fa-solid fa-square-plus"></i> افزودن کانال جدید</h3>
            <input type="hidden" id="chan-edit-id">
            <div class="form-row" style="margin-top: 4px; margin-bottom: 6px;">
                <input type="text" id="chan-name" placeholder="نام کانال">
                <select id="chan-category"></select>
            </div>
            <div class="form-row">
                <input type="text" id="chan-url" placeholder="آدرس استریم URL">
                <button class="action-mini-btn" id="chan-save-btn" onclick="saveChannel()"><i class="fa-solid fa-floppy-disk"></i> ذخیره کانال</button>
            </div>
            <button id="cancel-chan-edit" style="background:none; border:none; color:var(--danger-color); font-size:11px; cursor:pointer; display:none; margin-top:5px;" onclick="resetChannelForm()"><i class="fa-solid fa-rotate-left"></i> انصراف از ویرایش</button>
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border-color);">
        
        <div>
            <h3 id="cat-form-title"><i class="fa-solid fa-folder-plus"></i> افزودن دسته جدید</h3>
            <div class="form-row" style="margin-top: 4px;">
                <input type="text" id="category-name" placeholder="نام دسته (مثلاً: ورزشی، موزیک)">
                <button class="action-mini-btn" id="cat-save-btn" onclick="saveCategory()"><i class="fa-solid fa-plus"></i> ذخیره دسته</button>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border-color);">
        
        <div>
            <h3 id="backup-form-title"><i class="fa-solid fa-database"></i> پشتیبان‌گیری از اطلاعات</h3>
            <div class="backup-zone" style="margin-top: 4px;">
                <button class="backup-btn" id="export-btn" onclick="exportBackup()"><i class="fa-solid fa-cloud-arrow-down" style="color:var(--success-color); font-size:13px;"></i> دانلود فایل پشتیبان</button>
                <button class="backup-btn" id="import-btn" onclick="document.getElementById('import-file-input').click()"><i class="fa-solid fa-cloud-arrow-up" style="color:var(--accent-color); font-size:13px;"></i> بارگذاری فایل پشتیبان</button>
                <input type="file" id="import-file-input" accept=".json" style="display:none;" onchange="importBackup(this)">
            </div>
        </div>
    </div>

    <div class="tabs-container" id="tabs-container"></div>

    <div class="main-content">
        <ul class="station-list" id="station-list-container"></ul>
    </div>

    <div class="bottom-player">
        <div class="player-header">
            <div class="playing-name" id="track-title"><i class="fa-solid fa-compact-disc"></i> <span>کانالی انتخاب نشده است</span></div>
            <div class="status-badge">
                <span id="status-text">آماده</span>
                <div id="status-indicator" class="status-dot"></div>
            </div>
        </div>

        <div class="meta-info" id="meta-text"><i class="fa-solid fa-circle-info"></i> انتخاب کانال برای پخش...</div>

        <div class="controls-inline-row">
            <div class="control-sub-group timeline-container">
                <button id="master-play-btn" class="player-action-btn" onclick="togglePlayback()"><i class="fa-solid fa-play"></i></button>
                <button id="master-stop-btn" class="player-action-btn" onclick="stopPlayback()" title="توقف کامل"><i class="fa-solid fa-stop"></i></button>
                <span class="time-text" id="time-current">00:00</span>
                <input type="range" id="seek-slider" min="0" max="0" value="0" oninput="seekAudio(this.value); updateSliderFill(this);" onchange="seekAudio(this.value)">
                <span class="time-text" id="time-duration">00:00</span>
            </div>

            <div class="control-sub-group volume-container">
                <button id="mute-btn" class="player-action-btn" onclick="toggleMute()"><i class="fa-solid fa-volume-high"></i></button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" oninput="changeVolume(this.value)">
            </div>
        </div>
    </div>
</div>

    let currentLang = 'fa';
    let currentStation = null;
    let activeTabId = 'cat-all';
    let draggedStationId = null;
    let isExplicitStop = false;

            catFormTitle: '<i class="fa-solid fa-folder-plus"></i> افزودن دسته جدید',

            alertFillFields: 'تکمیل فیلدهای نام فرکانس و آدرس منبع الزامی است.',
            alertBackupSuccess: 'داده‌های پشتیبان با موفقیت بازیابی و اعمال شدند.',
            alertBackupInvalid: 'ساختار فایل انتخاب‌شده معتبر نیست.',
            alertBackupError: 'خطا در بارگذاری فایل. لطفاً از صحت فرمت داده‌ها اطمینان حاصل کنید.',
            alertSelectChannel: 'لطفاً ابتدا فرکانس مورد نظر خود را از لیست انتخاب کنید.',
            confirmDelCat: 'هشدار سیستم:\nآیا از حذف مجموعه {name} اطمینان دارید\nبا تایید این عملیات، ایستگاه‌های زیرمجموعه آن حذف نشده و به بخش "دسته‌بندی نشده" منتقل خواهند شد.',
            confirmDelChan: 'تایید حذف ایستگاه:\nآیا مایلید فرکانس رادیویی {name} را برای همیشه از لیست شبکه‌ها حذف کنید؟\nاین عملیات غیرقابل بازگشت است.',
            toolTipEdit: 'ویرایش فرکانس',
            toolTipDelete: 'حذف فرکانس',
            toolTipDelCat: 'حذف دسته',
            toolTipDrag: 'کشیدن برای جابجایی ترتیب'
        },
        en: {
            appTitle: '<i class="fa-solid fa-radio"></i> Nava',
            noStation: '<i class="fa-solid fa-compact-disc"></i> No Channel Selected',
            selectStation: '<i class="fa-solid fa-circle-info"></i> Select a channel to play...',
            statusReady: 'Ready',
            statusBuffering: 'Buffering...',
            statusPlaying: 'Live',
            statusPaused: 'Paused',
            statusError: 'Error!',
            metaConnecting: '<i class="fa-solid fa-spinner fa-spin"></i> Connecting...',
            metaBuffering: '<i class="fa-solid fa-ellipsis fa-bounce"></i> Receiving audio data...',
            metaPlaying: '<i class="fa-solid fa-wave-square"></i> Streaming live content...',
            metaError: '<i class="fa-solid fa-triangle-exclamation"></i> Connection to stream failed (Check URL resource).',
            metaPlayingTrack: '<i class="fa-solid fa-music fa-beat-fade"></i> Now Playing: ',
            allChannels: 'All Channels',
            radioNational: 'Music',
            uncategorized: 'Uncategorized',
            noStationFound: 'No stations found in this category.',
            chanFormTitle: '<i class="fa-solid fa-square-plus"></i> Add New Channel',
            chanFormTitleEdit: 'Edit Channel: ',
            chanNamePlaceholder: 'Channel Name',
            chanUrlPlaceholder: 'Stream URL Address',
            chanSaveBtn: 'Save Channel',
            chanCancelEdit: 'Cancel Edit',
            catFormTitle: '<i class="fa-solid fa-folder-plus"></i> Add New Category',
            catNamePlaceholder: 'Category Name (e.g. News, Music)',
            catSaveBtn: 'Save Category',
            backupFormTitle: '<i class="fa-solid fa-database"></i> Backup & Restore',
            exportBtn: '<i class="fa-solid fa-cloud-arrow-down" style="color:var(--success-color);"></i> Download Backup',
            importBtn: '<i class="fa-solid fa-cloud-arrow-up" style="color:var(--accent-color);"></i> Upload Backup',
            alertFillFields: 'Channel name and stream URL fields are required.',
            alertBackupSuccess: 'Backup data successfully restored.',
            alertBackupInvalid: 'Invalid backup file structure.',
            alertBackupError: 'Error loading file. Please verify file formatting.',
            alertSelectChannel: 'Please select a channel from the list first.',
            confirmDelCat: 'System Alert:\nAre you sure you want to delete category {name}?\nAll channels under this category will move to "Uncategorized".',
            confirmDelChan: 'Confirm Deletion:\nDo you want to permanently delete channel {name}?\nThis action cannot be undone.',
            toolTipEdit: 'Edit Channel',
            toolTipDelete: 'Delete Channel',
            toolTipDelCat: 'Delete Category',
            toolTipDrag: 'Drag to reorder'
        }
    };

    let categories = [
        { id: 'cat-all', nameFarsi: 'همه کانال‌ها', nameEnglish: 'All Channels' },
        { id: 'cat-1', nameFarsi: 'موسیقی', nameEnglish: 'Music' },
        { id: 'cat-2', nameFarsi: 'دسته‌بندی نشده', nameEnglish: 'Uncategorized' }
    ];

    let stations = [
        { id: '1', name: 'نواهنگ', url: 'https://navairan.com/;stream.nsv', categoryId: 'cat-1', isFavorite: false },
        { id: '2', name: 'رادیو شادی', url: 'https://ice9.securenetsystems.net/SHADI', categoryId: 'cat-1', isFavorite: false },
        { id: '3', name: 'Dance Wave', url: 'https://dancewave.online/dance.mp3', categoryId: 'cat-1', isFavorite: false }
    ];

    window.onload = function() {
        if(localStorage.getItem('radio_categories_v7')) {
            categories = JSON.parse(localStorage.getItem('radio_categories_v7'));
            stations = JSON.parse(localStorage.getItem('radio_stations_v7'));
        } else {
            saveToStorage();
        }
        
        currentLang = localStorage.getItem('radio_lang') || 'fa';
        applyLanguageDOM();

        const savedTheme = localStorage.getItem('radio_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        renderTabs();
        renderStations();
        updateCategorySelect();
        setupAudioListeners();
    };

    function updateSliderFill(slider) {
        if (!slider) return;
        const min = slider.min || 0;
        const max = slider.max || 100;
        const value = slider.value || 0;
        
        let percentage = ((value - min) / (max - min)) * 100;
        if (isNaN(percentage)) percentage = 0;

        slider.style.background = `linear-gradient(to right, var(--accent-color) ${percentage}%, var(--slider-empty) ${percentage}%)`;
    }

    function applyLanguageDOM() {
        const lang = currentLang;
        const dict = i18n[lang];

        document.getElementById('app-title').innerHTML = dict.appTitle;
        document.getElementById('lang-toggle-btn').innerText = lang === 'fa' ? 'EN' : 'FA';
        
        if(document.getElementById('chan-edit-id').value === '') {
            document.getElementById('chan-form-title').innerHTML = dict.chanFormTitle;
        }
        document.getElementById('chan-name').placeholder = dict.chanNamePlaceholder;
        document.getElementById('chan-url').placeholder = dict.chanUrlPlaceholder;
        document.getElementById('chan-save-btn').innerHTML = `<i class="fa-solid fa-floppy-disk"></i> ` + dict.chanSaveBtn;
        document.getElementById('cancel-chan-edit').innerHTML = `<i class="fa-solid fa-rotate-left"></i> ` + dict.chanCancelEdit;
        
        document.getElementById('cat-form-title').innerHTML = dict.catFormTitle;
        document.getElementById('category-name').placeholder = dict.catNamePlaceholder;
        document.getElementById('cat-save-btn').innerHTML = `<i class="fa-solid fa-plus"></i> ` + dict.catSaveBtn;
        
        document.getElementById('backup-form-title').innerHTML = dict.backupFormTitle;
        document.getElementById('export-btn').innerHTML = dict.exportBtn;
        document.getElementById('import-btn').innerHTML = dict.importBtn;

        if (currentStation) {
            if (audio.paused && !audio.src) {
                document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc"></i> <span>${currentStation.name}</span>`;
                document.getElementById('meta-text').innerHTML = dict.selectStation;
            } else if (!audio.paused && audio.src) {
                document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc fa-spin"></i> <span>${currentStation.name}</span>`;
                document.getElementById('meta-text').innerHTML = dict.metaPlaying;
            } else if (audio.paused && audio.src) {
                document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc"></i> <span>${currentStation.name}</span>`;
                document.getElementById('meta-text').innerHTML = dict.selectStation;
            }
        } else {
            document.getElementById('track-title').innerHTML = dict.noStation;
            document.getElementById('meta-text').innerHTML = dict.selectStation;
        }
        
        document.getElementById('status-text').innerText = getStatusString();

        if (lang === 'en') {
            document.documentElement.setAttribute('dir', 'ltr');
            document.documentElement.setAttribute('lang', 'en');
        } else {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.setAttribute('lang', 'fa');
        }
        
        setTimeout(() => {
            updateSliderFill(document.getElementById('volume-slider'));
            updateSliderFill(document.getElementById('seek-slider'));
        }, 30);
    }

    function toggleLang() {
        currentLang = currentLang === 'fa' ? 'en' : 'fa';
        localStorage.setItem('radio_lang', currentLang);
        applyLanguageDOM();
        renderTabs();
        renderStations();
        updateCategorySelect();
    }

    function getStatusString() {
        const dot = document.getElementById('status-indicator');
        const dict = i18n[currentLang];
        if (!dot) return dict.statusReady;
        if (dot.classList.contains('playing')) return dict.statusPlaying;
        if (dot.classList.contains('loading')) return dict.statusBuffering;
        if (dot.classList.contains('error')) return dict.statusError;
        if (audio.src && audio.paused) return dict.statusPaused;
        return dict.statusReady;
    }

    function saveToStorage() {
        localStorage.setItem('radio_categories_v7', JSON.stringify(categories));
        localStorage.setItem('radio_stations_v7', JSON.stringify(stations));
    }

    function exportBackup() {
        const backupData = { version: "7.0", categories, stations };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "nava_backup.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importBackup(inputElement) {
        const file = inputElement.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const parsedData = JSON.parse(e.target.result);
                if (parsedData.categories && parsedData.stations) {
                    categories = parsedData.categories;
                    stations = parsedData.stations;
                    saveToStorage();
                    activeTabId = 'cat-all';
                    renderTabs();
                    renderStations();
                    updateCategorySelect();
                    alert(i18n[currentLang].alertBackupSuccess);
                    inputElement.value = '';
                } else {
                    alert(i18n[currentLang].alertBackupInvalid);
                }
            } catch (err) {
                alert(i18n[currentLang].alertBackupError);
            }
        };
        reader.readAsText(file);
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('radio_theme', newTheme);
        updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('theme-toggle-btn').querySelector('i');
        icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    function toggleManagePanel() {
        const panel = document.getElementById('manage-panel');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
    }

    function updateCategorySelect() {
        const select = document.getElementById('chan-category');
        select.innerHTML = '';
        categories.forEach(cat => {
            if(cat.id !== 'cat-all') {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.innerText = currentLang === 'fa' ? cat.nameFarsi : cat.nameEnglish;
                select.appendChild(opt);
            }
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabs-container');
        container.innerHTML = '';

        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${activeTabId === cat.id ? 'active' : ''}`;
            btn.onclick = () => { activeTabId = cat.id; renderTabs(); renderStations(); };

            let deleteIcon = '';
            if (cat.id !== 'cat-all' && cat.id !== 'cat-2') {
                deleteIcon = `<i class="fa-solid fa-circle-xmark delete-cat-icon" onclick="deleteCategory(event, '${cat.id}')" title="${i18n[currentLang].toolTipDelCat}"></i>`;
            }

            const name = currentLang === 'fa' ? cat.nameFarsi : cat.nameEnglish;
            btn.innerHTML = `<span>${name}</span> ${deleteIcon}`;
            container.appendChild(btn);
        });
    }

    function renderStations() {
        const container = document.getElementById('station-list-container');
        container.innerHTML = '';

        let filteredStations = [...stations];
        if (activeTabId !== 'cat-all') {
            filteredStations = stations.filter(s => s.categoryId === activeTabId);
        }
        filteredStations.sort((a,b) => b.isFavorite - a.isFavorite);

        if(filteredStations.length === 0) {
            container.innerHTML = `<p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:20px;">${i18n[currentLang].noStationFound}</p>`;
            return;
        }

        filteredStations.forEach(station => {
            const li = document.createElement('li');
            li.className = `station-item ${currentStation && currentStation.id === station.id ? 'active-playing' : ''}`;
            li.dataset.id = station.id;

            li.addEventListener('dragover', handleDragOver);
            li.addEventListener('drop', handleDrop);

            li.innerHTML = `
                <div class="station-info" onclick="selectStation('${station.id}')">
                    <i class="fa-solid fa-star fav-star ${station.isFavorite ? 'active' : ''}" onclick="toggleFavorite(event, '${station.id}')"></i>
                    <span>${station.name}</span>
                </div>
                <div class="item-actions">
                    <button class="edit" onclick="editChannel('${station.id}')" title="${i18n[currentLang].toolTipEdit}"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button class="delete" onclick="deleteChannel('${station.id}')" title="${i18n[currentLang].toolTipDelete}"><i class="fa-solid fa-trash-can"></i></button>
                    <div class="drag-handle" draggable="true" title="${i18n[currentLang].toolTipDrag}">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                </div>
            `;

            const handle = li.querySelector('.drag-handle');
            handle.addEventListener('dragstart', (e) => handleDragStart(e, li));
            handle.addEventListener('dragend', () => handleDragEnd(li));

            container.appendChild(li);
        });
    }

    function handleDragStart(e, rowElement) {
        draggedStationId = rowElement.dataset.id;
        e.dataTransfer.effectAllowed = 'move';
        rowElement.style.opacity = '0.4';
    }

    function handleDragOver(e) {
        if (e.preventDefault) { e.preventDefault(); }
        e.dataTransfer.dropEffect = 'move';
        return false;
    }

    function handleDrop(e) {
        e.stopPropagation();
        const targetStationId = this.dataset.id;
        if (draggedStationId && draggedStationId !== targetStationId) {
            const fromIndex = stations.findIndex(s => s.id === draggedStationId);
            const toIndex = stations.findIndex(s => s.id === targetStationId);
            if (fromIndex !== -1 && toIndex !== -1) {
                const [movedStation] = stations.splice(fromIndex, 1);
                stations.splice(toIndex, 0, movedStation);
                saveToStorage();
                renderStations();
            }
        }
        return false;
    }

    function handleDragEnd(rowElement) {
        rowElement.style.opacity = '1';
    }

    function saveCategory() {
        const nameInput = document.getElementById('category-name');
        const name = nameInput.value.trim();
        if(!name) return;

        categories.push({ id: 'cat-' + Date.now(), nameFarsi: name, nameEnglish: name });
        nameInput.value = '';
        saveToStorage();
        renderTabs();
        updateCategorySelect();
        document.getElementById('manage-panel').style.display = 'none';
    }

    function deleteCategory(event, catId) {
        event.stopPropagation();
        const targetCategory = categories.find(c => c.id === catId);
        const nameStr = targetCategory ? `"${currentLang === 'fa' ? targetCategory.nameFarsi : targetCategory.nameEnglish}"` : "";
        
        if(!confirm(i18n[currentLang].confirmDelCat.replace('{name}', nameStr))) return;
        
        stations.forEach(s => { if(s.categoryId === catId) s.categoryId = 'cat-2'; });
        categories = categories.filter(c => c.id !== catId);
        if (activeTabId === catId) activeTabId = 'cat-all';

        saveToStorage();
        renderTabs();
        renderStations();
        updateCategorySelect();
    }

    function saveChannel() {
        const idInput = document.getElementById('chan-edit-id').value;
        const name = document.getElementById('chan-name').value.trim();
        const catId = document.getElementById('chan-category').value;
        const url = document.getElementById('chan-url').value.trim();

        if (!name || !url) { alert(i18n[currentLang].alertFillFields); return; }

        if (idInput) {
            const station = stations.find(s => s.id === idInput);
            if (station) { station.name = name; station.url = url; station.categoryId = catId; }
        } else {
            stations.push({ id: 'chan-' + Date.now(), name, url, categoryId: catId, isFavorite: false });
        }

        saveToStorage();
        renderStations();
        resetChannelForm();
        document.getElementById('manage-panel').style.display = 'none';
    }

    function editChannel(id) {
        const station = stations.find(s => s.id === id);
        if (!station) return;

        document.getElementById('chan-edit-id').value = station.id;
        document.getElementById('chan-name').value = station.name;
        document.getElementById('chan-url').value = station.url;
        document.getElementById('chan-category').value = station.categoryId;
        
        document.getElementById('chan-form-title').innerHTML = `<i class="fa-solid fa-pen-to-square"></i> ` + i18n[currentLang].chanFormTitleEdit + station.name;
        document.getElementById('cancel-chan-edit').style.display = "inline-block";
        document.getElementById('manage-panel').style.display = 'flex';
    }

    function deleteChannel(id) {
        const station = stations.find(s => s.id === id);
        const nameStr = station ? `"${station.name}"` : "";

        if(!confirm(i18n[currentLang].confirmDelChan.replace('{name}', nameStr))) return;
        
        stations = stations.filter(s => s.id !== id);
        saveToStorage();
        renderStations();
        if (currentStation && currentStation.id === id) {
            stopPlayback();
        }
    }

    function resetChannelForm() {
        document.getElementById('chan-edit-id').value = '';
        document.getElementById('chan-name').value = '';
        document.getElementById('chan-url').value = '';
        document.getElementById('chan-form-title').innerHTML = i18n[currentLang].chanFormTitle;
        document.getElementById('cancel-chan-edit').style.display = "none";
        document.getElementById('manage-panel').style.display = 'none';
    }

    function toggleFavorite(event, id) {
        event.stopPropagation();
        const station = stations.find(s => s.id === id);
        if (station) { station.isFavorite = !station.isFavorite; saveToStorage(); renderStations(); }
    }

    function selectStation(id) {
        const station = stations.find(s => s.id === id);
        if (!station) return;

        currentStation = station;
        document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc fa-spin"></i> <span>${station.name}</span>`;
        document.getElementById('meta-text').innerHTML = i18n[currentLang].metaConnecting;
        
        isExplicitStop = false;
        audio.src = station.url;
        audio.load();
        
        renderStations(); 
        audio.play().catch(() => { if(!isExplicitStop) updateStatus('error'); });
    }

    function togglePlayback() {
        if(!currentStation) { alert(i18n[currentLang].alertSelectChannel); return; }
        
        if(!audio.src || audio.src === window.location.href || isExplicitStop) {
            isExplicitStop = false;
            audio.src = currentStation.url;
            audio.load();
            document.getElementById('meta-text').innerHTML = i18n[currentLang].metaConnecting;
            updateStatus('loading');
            audio.play().catch(() => { if(!isExplicitStop) updateStatus('error'); });
            return;
        }
        
        if(audio.paused) { isExplicitStop = false; audio.play().catch(() => { if(!isExplicitStop) updateStatus('error'); }); } else { audio.pause(); }
    }

    function stopPlayback() {
        isExplicitStop = true;
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        updateStatus('ready');
        document.getElementById('master-play-btn').innerHTML = '<i class="fa-solid fa-play"></i>';
        document.getElementById('time-current').innerText = "00:00";
        document.getElementById('time-duration').innerText = "00:00";
        
        const seek = document.getElementById('seek-slider');
        seek.value = 0;
        seek.max = 0;
        updateSliderFill(seek);
        
        if(currentStation) {
            document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc"></i> <span>${currentStation.name}</span>`;
            document.getElementById('meta-text').innerHTML = i18n[currentLang].selectStation;
        } else {
            document.getElementById('track-title').innerHTML = i18n[currentLang].noStation;
            document.getElementById('meta-text').innerHTML = i18n[currentLang].selectStation;
        }
    }

    function seekAudio(value) { 
        if(audio.src && isFinite(audio.duration) && audio.duration !== Infinity) {
            audio.currentTime = value; 
        }
    }

    function changeVolume(val) {
        audio.volume = val;
        audio.muted = (val == 0);
        updateMuteIcon();
        updateSliderFill(document.getElementById('volume-slider'));
    }

    function toggleMute() { 
        audio.muted = !audio.muted; 
        updateMuteIcon();
    }

    function updateMuteIcon() {
        const icon = document.getElementById('mute-btn').querySelector('i');
        const volSlider = document.getElementById('volume-slider');
        
        if (audio.muted || audio.volume == 0) {
            icon.className = "fa-solid fa-volume-xmark";
            document.getElementById('mute-btn').style.background = "var(--danger-color)";
            document.getElementById('mute-btn').style.borderColor = "var(--danger-color)";
            document.getElementById('mute-btn').style.color = "white";
        } else {
            icon.className = "fa-solid fa-volume-high";
            document.getElementById('mute-btn').style.background = "var(--card-color)";
            document.getElementById('mute-btn').style.borderColor = "var(--border-color)";
            document.getElementById('mute-btn').style.color = "var(--text-muted)";
        }
        updateSliderFill(volSlider);
    }

    function updateStatus(state) {
        const indicator = document.getElementById('status-indicator');
        const text = document.getElementById('status-text');
        
        indicator.className = 'status-dot';
        if (state === 'playing') indicator.classList.add('playing');
        else if (state === 'loading') indicator.classList.add('loading');
        else if (state === 'error') indicator.classList.add('error');

        text.innerText = getStatusString();
    }

    function formatTime(secs) {
        if (isNaN(secs) || !isFinite(secs)) return "00:00";
        const m = Math.floor(secs / 60).toString().padStart(2, '0');
        const s = Math.floor(secs % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function setupAudioListeners() {
        audio.addEventListener('timeupdate', () => {
            if(isFinite(audio.duration) && audio.duration > 0 && audio.duration !== Infinity) {
                document.getElementById('time-current').innerText = formatTime(audio.currentTime);
                const seek = document.getElementById('seek-slider');
                seek.value = audio.currentTime;
                updateSliderFill(seek);
            }
        });

        audio.addEventListener('durationchange', () => {
            const seek = document.getElementById('seek-slider');
            if(isFinite(audio.duration) && audio.duration > 0 && audio.duration !== Infinity) {
                seek.max = audio.duration;
                document.getElementById('time-duration').innerText = formatTime(audio.duration);
                seek.disabled = false;
                seek.style.opacity = "1";
            } else {
                seek.max = 0;
                seek.value = 0;
                document.getElementById('time-current').innerText = "00:00";
                document.getElementById('time-duration').innerText = "LIVE";
                seek.disabled = true;
                seek.style.opacity = "0.5";
            }
            updateSliderFill(seek);
        });

        audio.addEventListener('waiting', () => {
            updateStatus('loading');
            document.getElementById('meta-text').innerHTML = i18n[currentLang].metaBuffering;
        });
        
        audio.addEventListener('playing', () => {
            updateStatus('playing');
            document.getElementById('master-play-btn').innerHTML = '<i class="fa-solid fa-pause"></i>';
            if (currentStation) {
                document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc fa-spin"></i> <span>${currentStation.name}</span>`;
            }
            const currentMeta = document.getElementById('meta-text').innerHTML;
            if(currentMeta === i18n.fa.metaBuffering || currentMeta === i18n.en.metaBuffering || currentMeta === i18n.fa.metaConnecting || currentMeta === i18n.en.metaConnecting) {
                document.getElementById('meta-text').innerHTML = i18n[currentLang].metaPlaying;
            }
        });

        audio.addEventListener('pause', () => {
            if(audio.src && !isExplicitStop) {
                updateStatus('ready');
                document.getElementById('master-play-btn').innerHTML = '<i class="fa-solid fa-play"></i>';
                if (currentStation) {
                    document.getElementById('track-title').innerHTML = `<i class="fa-solid fa-compact-disc"></i> <span>${currentStation.name}</span>`;
                }
            }
        });

        audio.addEventListener('error', () => {
            if (isExplicitStop) return;

            updateStatus('error');
            document.getElementById('master-play-btn').innerHTML = '<i class="fa-solid fa-play"></i>';
            document.getElementById('meta-text').innerHTML = i18n[currentLang].metaError;
        });

        if ('mediaSession' in navigator) {
            audio.addEventListener('loadstart', () => { navigator.mediaSession.metadata = null; });
            const parseMetadata = () => {
                if (navigator.mediaSession.metadata) {
                    const title = navigator.mediaSession.metadata.title || "";
                    const artist = navigator.mediaSession.metadata.artist || "";
                    if(title || artist) {
                        document.getElementById('meta-text').innerHTML = `${i18n[currentLang].metaPlayingTrack}${title} ${artist ? ' - ' + artist : ''}`;
                    }
                }
            };
            audio.addEventListener('loadedmetadata', parseMetadata);
            audio.addEventListener('durationchange', parseMetadata);
        }
    }
</script>

</body>
</html>
